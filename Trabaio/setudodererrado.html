<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore SESI | Finalizar Compra</title>
    <link rel="stylesheet" href="trabaio2.css">
</head>
<body>

<div class="container">
    <h1>TechStore SESI</h1>

    <section class="formulario">

        <h3>Finalizar Compra 🛒</h3>

        <label for="inputNome">Nome do cliente</label>
        <input type="text" id="inputNome" placeholder="Nome do cliente">

        <label for="inputIdade">Idade</label>
        <input type="number" id="inputIdade" placeholder="Idade do cliente" min="0">

        <label for="inputValor">Valor da compra</label>
        <input type="number" id="inputValor" placeholder="Valor da compra">

        <label for="inputCupom">Cupom</label>
        <select id="inputCupom">
            <option value="false">Não possui cupom</option>
            <option value="true">Possui cupom (15% OFF)</option>
        </select>

        <button id="btnfinalizar" onclick="executarSistema()">
            Finalizar Venda
        </button>

    </section>

    <hr>

    <section id="feedback">

        <h3>Resultado</h3>

        <p id="mensagem-autorizacao">Aguardando processamento...</p>

        <div id="venda-concluida" style="display:none; color:green; font-weight:bold; font-size:18px; margin-top:10px;">
            ✅ VENDA CONCLUÍDA COM SUCESSO!
        </div>

        <div id="relatorio-final" class="card" style="display:none;"></div>

    </section>
</div>

<script src="setudodererrado.js"></script>

</body>
</html>
